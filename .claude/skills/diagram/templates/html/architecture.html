<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="lib/base.css">
</head>
<body class="auto-size">
<svg id="canvas"></svg>

<script src="lib/utils.js"></script>
<script>
(function() {
  var svg = document.getElementById('canvas');

  // ========== 数据定义 ==========
  var title = '电商平台 · 系统架构';
  var subtitle = 'System Architecture Overview';

  var layers = [
    { label: '客户端层', nodes: [
      { label: 'Web App', desc: 'React SPA' },
      { label: 'Mobile App', desc: 'React Native' },
      { label: 'Admin Panel', desc: 'Vue.js' }
    ]},
    { label: 'API 网关层', nodes: [
      { label: 'Nginx', desc: '负载均衡' },
      { label: 'API Gateway', desc: '鉴权 + 路由' }
    ]},
    { label: '服务层', nodes: [
      { label: '用户服务', desc: 'Go' },
      { label: '订单服务', desc: 'Java' },
      { label: '支付服务', desc: 'Java' },
      { label: '商品服务', desc: 'Go' }
    ]},
    { label: '数据层', nodes: [
      { label: 'MySQL', desc: '主从集群' },
      { label: 'Redis', desc: '缓存集群' },
      { label: 'Elasticsearch', desc: '搜索引擎' }
    ]}
  ];

  // ========== 主题 ==========
  var theme = {
    layers: [
      { bg: 'rgba(59,130,246,0.08)',  border: 'rgba(59,130,246,0.2)',  color: '#1E40AF' },
      { bg: 'rgba(6,182,212,0.08)',   border: 'rgba(6,182,212,0.2)',   color: '#155E75' },
      { bg: 'rgba(16,185,129,0.08)',  border: 'rgba(16,185,129,0.2)',  color: '#065F46' },
      { bg: 'rgba(245,158,11,0.08)',  border: 'rgba(245,158,11,0.2)',  color: '#92400E' },
      { bg: 'rgba(139,92,246,0.08)',  border: 'rgba(139,92,246,0.2)',  color: '#5B21B6' },
      { bg: 'rgba(244,63,94,0.08)',   border: 'rgba(244,63,94,0.2)',   color: '#9F1239' }
    ],
    node: { bg: '#FFFFFF', border: '#E2E8F0', text: '#1E293B', desc: '#64748B' }
  };

  // ========== 工具函数 ==========
  var FONT = "-apple-system, system-ui, 'PingFang SC', sans-serif";

  // ========== 布局参数 ==========
  var TITLE_H = 52;
  var LAYER_GAP = 16;
  var LAYER_PAD_X = 20;
  var LAYER_PAD_Y = 16;
  var LAYER_LABEL_W = 72;
  var LAYER_LABEL_GAP = 12;
  var NODE_GAP = 16;
  var NODE_PAD_X = 20;
  var NODE_H = 48;

  // ========== 计算布局 ==========
  // 每层节点等宽（取该层最大宽度）
  var layerData = [];
  var maxLayerW = 0;

  layers.forEach(function(layer, li) {
    var nodeW = 80;
    layer.nodes.forEach(function(n) {
      var w = Math.max(mt(n.label, 13), mt(n.desc, 11)) + NODE_PAD_X * 2;
      if (w > nodeW) nodeW = w;
    });
    var nodesW = layer.nodes.length * nodeW + (layer.nodes.length - 1) * NODE_GAP;
    var totalW = LAYER_LABEL_W + LAYER_LABEL_GAP + nodesW + LAYER_PAD_X * 2;
    if (totalW > maxLayerW) maxLayerW = totalW;
    layerData.push({ label: layer.label, nodes: layer.nodes, nodeW: nodeW, nodesW: nodesW });
  });

  // 分配坐标
  var curY = TITLE_H;
  layerData.forEach(function(ld, li) {
    ld.x = 0;
    ld.y = curY;
    ld.w = maxLayerW;
    ld.h = NODE_H + LAYER_PAD_Y * 2;
    curY += ld.h + LAYER_GAP;
  });

  // ========== 画布 ==========
  var svgW = maxLayerW + 48;
  var svgH = curY - LAYER_GAP + 24;
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);

  // ========== 标题 ==========
  svg.appendChild(el('text', { x: 0, y: 18, 'font-size': 16, 'font-weight': 700, fill: '#0F172A', 'font-family': FONT }, title));
  svg.appendChild(el('text', { x: 0, y: 36, 'font-size': 12, fill: '#888', 'font-family': FONT }, subtitle));

  // ========== 绘制层 ==========
  layerData.forEach(function(ld, li) {
    var lt = theme.layers[li % theme.layers.length];

    // 层背景
    svg.appendChild(el('rect', { x: ld.x, y: ld.y, width: ld.w, height: ld.h, rx: 8, fill: lt.bg, stroke: lt.border, 'stroke-width': 1 }));

    // 层标签
    svg.appendChild(el('text', { x: ld.x + LAYER_PAD_X, y: ld.y + ld.h / 2, 'font-size': 13, 'font-weight': 600, fill: lt.color, 'font-family': FONT, 'dominant-baseline': 'central' }, ld.label));

    // 节点区域起始 X
    var nodesStartX = ld.x + LAYER_PAD_X + LAYER_LABEL_W + LAYER_LABEL_GAP;
    var availW = ld.w - LAYER_PAD_X * 2 - LAYER_LABEL_W - LAYER_LABEL_GAP;
    // 节点居中
    var totalNodesW = ld.nodes.length * ld.nodeW + (ld.nodes.length - 1) * NODE_GAP;
    var startX = nodesStartX + (availW - totalNodesW) / 2;

    ld.nodes.forEach(function(node, ni) {
      var nx = startX + ni * (ld.nodeW + NODE_GAP);
      var ny = ld.y + LAYER_PAD_Y;

      svg.appendChild(el('rect', { x: nx, y: ny, width: ld.nodeW, height: NODE_H, rx: 6, fill: theme.node.bg, stroke: theme.node.border, 'stroke-width': 1 }));
      svg.appendChild(el('text', { x: nx + ld.nodeW / 2, y: ny + 19, 'font-size': 13, 'font-weight': 600, fill: theme.node.text, 'font-family': FONT, 'text-anchor': 'middle' }, node.label));
      svg.appendChild(el('text', { x: nx + ld.nodeW / 2, y: ny + 35, 'font-size': 11, fill: theme.node.desc, 'font-family': FONT, 'text-anchor': 'middle' }, node.desc));
    });
  });

})();
</script>
</body>
</html>
