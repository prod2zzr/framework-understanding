<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{PRESENTATION_TITLE}</title>

  <!-- Google Fonts（替换为选定的字体） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── 视觉系统 ── */
    :root {
      /* 颜色 */
      --color-bg: #0f172a;
      --color-surface: #1e293b;
      --color-text: #f1f5f9;
      --color-text-secondary: #94a3b8;
      --color-accent: #38bdf8;
      --color-accent-hover: #0ea5e9;
      --color-success: #22c55e;
      --color-warning: #f59e0b;

      /* 字体 */
      --font-display: 'Inter', 'Noto Sans SC', sans-serif;
      --font-body: 'Inter', 'Noto Sans SC', sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;

      /* 字号 */
      --font-size-title: clamp(2.2rem, 5vw, 4rem);
      --font-size-subtitle: clamp(1.4rem, 3vw, 2.2rem);
      --font-size-body: clamp(1rem, 1.8vw, 1.4rem);
      --font-size-small: clamp(0.8rem, 1.2vw, 1rem);

      /* 间距 */
      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 2rem;
      --space-xl: 4rem;
      --space-2xl: 8rem;

      /* 圆角 */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 16px;

      /* 过渡 */
      --transition-slide: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      --transition-fast: 0.2s ease;
      --transition-fragment: 0.4s ease;
    }

    /* ── Container ── */
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    .presentation {
      position: relative;
      width: 100%; height: 100%;
      overflow: hidden;
    }

    /* ── Progress Bar ── */
    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      background: var(--color-accent);
      transition: width 0.3s ease;
      z-index: 200;
    }

    /* ── Slides Track ── */
    .slides-track {
      display: flex;
      height: 100%;
      transition: transform var(--transition-slide);
    }

    /* ── Slide ── */
    .slide {
      flex: 0 0 100%;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: var(--space-xl) var(--space-2xl);
      text-align: center;
      position: relative;
    }

    .slide.left-align {
      text-align: left;
      align-items: flex-start;
    }

    /* ── 排版层级 ── */
    .slide h1 {
      font-family: var(--font-display);
      font-size: var(--font-size-title);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: var(--space-md);
      letter-spacing: -0.02em;
    }

    .slide h2 {
      font-family: var(--font-display);
      font-size: var(--font-size-subtitle);
      font-weight: 600;
      line-height: 1.25;
      margin-bottom: var(--space-lg);
    }

    .slide h3 {
      font-size: var(--font-size-body);
      font-weight: 600;
      color: var(--color-accent);
      margin-bottom: var(--space-md);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .slide p {
      font-size: var(--font-size-body);
      color: var(--color-text-secondary);
      max-width: 50ch;
      line-height: 1.7;
      margin-bottom: var(--space-md);
    }

    .slide ul {
      list-style: none;
      text-align: left;
      font-size: var(--font-size-body);
      line-height: 2;
      color: var(--color-text-secondary);
    }

    .slide ul li { padding-left: 1.5em; position: relative; }
    .slide ul li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--color-accent);
    }

    .slide code {
      font-family: var(--font-mono);
      background: var(--color-surface);
      padding: 0.15em 0.4em;
      border-radius: var(--radius-sm);
      font-size: 0.9em;
    }

    .slide pre {
      background: var(--color-surface);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      overflow-x: auto;
      text-align: left;
      width: 100%;
      max-width: 50rem;
    }

    .slide pre code {
      background: none;
      padding: 0;
      font-size: var(--font-size-small);
      line-height: 1.6;
    }

    .slide blockquote {
      border-left: 3px solid var(--color-accent);
      padding-left: var(--space-lg);
      font-style: italic;
      color: var(--color-text-secondary);
      max-width: 40ch;
    }

    /* ── 组件 ── */
    .subtitle {
      font-size: var(--font-size-body);
      color: var(--color-accent);
      margin-bottom: var(--space-sm);
      font-weight: 500;
    }

    .stat-number {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      color: var(--color-accent);
      line-height: 1;
      margin-bottom: var(--space-sm);
      font-variant-numeric: tabular-nums;
    }

    .highlight { color: var(--color-accent); font-weight: 600; }

    .image-container {
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 80%;
    }

    .image-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-xl);
      width: 100%;
      max-width: 60rem;
      text-align: left;
    }

    .card {
      background: var(--color-surface);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* ── Fragment：逐步显现 ── */
    .fragment {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity var(--transition-fragment), transform var(--transition-fragment);
    }

    .fragment.visible {
      opacity: 1;
      transform: none;
    }

    /* ── Controls ── */
    .controls {
      position: fixed;
      bottom: var(--space-lg);
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--space-lg);
      z-index: 100;
    }

    .controls button {
      background: var(--color-surface);
      color: var(--color-text);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      padding: var(--space-sm) var(--space-md);
      font-size: var(--font-size-small);
      cursor: pointer;
      transition: background var(--transition-fast), border-color var(--transition-fast);
    }

    .controls button:hover {
      background: var(--color-accent);
      border-color: var(--color-accent);
    }

    .controls button:disabled { opacity: 0.3; cursor: not-allowed; }

    .slide-counter {
      font-size: var(--font-size-small);
      color: var(--color-text-secondary);
      font-variant-numeric: tabular-nums;
    }

    /* ── Pagination Dots ── */
    .pagination {
      position: fixed;
      bottom: calc(var(--space-lg) + 3rem);
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      z-index: 100;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color-text-secondary);
      opacity: 0.3;
      cursor: pointer;
      transition: opacity var(--transition-fast), transform var(--transition-fast), background var(--transition-fast);
    }

    .dot:hover { opacity: 0.6; transform: scale(1.3); }
    .dot.active {
      opacity: 1;
      background: var(--color-accent);
      transform: scale(1.3);
    }

    /* ── 响应式：移动端 ── */
    @media (max-width: 768px) {
      .slide {
        padding: var(--space-lg) var(--space-md);
      }

      .controls button { display: none; }

      .two-column {
        grid-template-columns: 1fr;
        gap: var(--space-md);
      }

      .pagination { gap: 8px; }
      .dot { width: 6px; height: 6px; }

      .image-container { max-width: 95%; }
    }
  </style>
</head>
<body>

<!-- Progress Bar -->
<div class="progress-bar" id="progressBar"></div>

<div class="presentation">
  <div class="slides-track" id="slidesTrack">

    <!-- ====== Slide 1: 封面 ====== -->
    <section class="slide">
      <h3>{SUBTITLE}</h3>
      <h1>{PRESENTATION_TITLE}</h1>
      <p>{AUTHOR} · {DATE}</p>
    </section>

    <!-- ====== Slide 2: 示例 —— 带 Fragment ====== -->
    <section class="slide left-align">
      <h2>{SLIDE_2_TITLE}</h2>
      <ul>
        <li class="fragment">{POINT_1}</li>
        <li class="fragment">{POINT_2}</li>
        <li class="fragment">{POINT_3}</li>
      </ul>
    </section>

    <!-- ====== Slide 3: 示例 —— 统计数据 ====== -->
    <section class="slide">
      <h3>{METRIC_LABEL}</h3>
      <div class="stat-number fragment">{STAT_VALUE}</div>
      <p class="fragment">{STAT_DESCRIPTION}</p>
    </section>

    <!-- ====== Slide 4: 示例 —— 双栏布局 ====== -->
    <section class="slide">
      <h2>{SLIDE_4_TITLE}</h2>
      <div class="two-column">
        <div class="card fragment">
          <h3>{COL_1_TITLE}</h3>
          <p>{COL_1_CONTENT}</p>
        </div>
        <div class="card fragment">
          <h3>{COL_2_TITLE}</h3>
          <p>{COL_2_CONTENT}</p>
        </div>
      </div>
    </section>

    <!-- ====== Slide 5: 示例 —— 图片页 ====== -->
    <section class="slide">
      <h2>{SLIDE_5_TITLE}</h2>
      <div class="image-container fragment">
        <img src="{IMAGE_URL}" alt="{IMAGE_ALT}" loading="lazy">
      </div>
    </section>

    <!-- ====== 更多 Slide 在此添加 ====== -->

    <!-- ====== 结尾页 ====== -->
    <section class="slide">
      <h2>Thank You</h2>
      <p>{CLOSING_MESSAGE}</p>
    </section>

  </div>
</div>

<!-- Pagination Dots -->
<div class="pagination" id="pagination"></div>

<!-- Controls -->
<div class="controls">
  <button id="prevBtn" onclick="prevSlide()">← 上一页</button>
  <span class="slide-counter" id="counter">1 / 6</span>
  <button id="nextBtn" onclick="nextSlide()">下一页 →</button>
</div>

<script>
  // ── 状态 ──
  let currentIndex = 0;
  const track = document.getElementById('slidesTrack');
  const slides = track.querySelectorAll('.slide');
  const total = slides.length;
  const counter = document.getElementById('counter');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const progressBar = document.getElementById('progressBar');
  const pagination = document.getElementById('pagination');

  // ── 初始化分页圆点 ──
  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goToSlide(i));
    pagination.appendChild(dot);
  });
  const dots = pagination.querySelectorAll('.dot');

  // ── Fragment 管理 ──
  function getFragments(slideIndex) {
    return slides[slideIndex].querySelectorAll('.fragment');
  }

  function getVisibleFragments(slideIndex) {
    return slides[slideIndex].querySelectorAll('.fragment.visible');
  }

  function getHiddenFragments(slideIndex) {
    return slides[slideIndex].querySelectorAll('.fragment:not(.visible)');
  }

  // ── 核心切页逻辑 ──
  function goToSlide(index, resetFragments = true) {
    if (index < 0 || index >= total) return;
    currentIndex = index;

    // Motion：移动轨道
    track.style.transform = `translateX(-${currentIndex * 100}%)`;

    // 进度条
    progressBar.style.width = `${(currentIndex / (total - 1)) * 100}%`;

    // 分页圆点
    dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));

    // 页码
    counter.textContent = `${currentIndex + 1} / ${total}`;
    prevBtn.disabled = currentIndex === 0;
    nextBtn.disabled = currentIndex === total - 1;

    // Fragment 重置
    if (resetFragments) {
      slides.forEach((slide, i) => {
        const frags = slide.querySelectorAll('.fragment');
        if (i < currentIndex) {
          // 已过的页：所有 fragment 显现
          frags.forEach(f => f.classList.add('visible'));
        } else if (i > currentIndex) {
          // 未到的页：所有 fragment 隐藏
          frags.forEach(f => f.classList.remove('visible'));
        }
        // 当前页：保持现状（向前翻入时隐藏，向后翻入时显现）
      });
    }

    // URL 同步
    const url = new URL(window.location);
    url.searchParams.set('slide', currentIndex);
    history.pushState({ slide: currentIndex }, '', url);

    // 媒体预加载
    preloadAdjacentMedia(currentIndex);
  }

  function nextSlide() {
    // 先推进 fragment
    const hidden = getHiddenFragments(currentIndex);
    if (hidden.length > 0) {
      hidden[0].classList.add('visible');
      return;
    }
    // 所有 fragment 显现后，翻页
    if (currentIndex < total - 1) {
      goToSlide(currentIndex + 1);
      // 新页 fragment 全部隐藏
      getFragments(currentIndex).forEach(f => f.classList.remove('visible'));
    }
  }

  function prevSlide() {
    // 先回退 fragment
    const visible = getVisibleFragments(currentIndex);
    if (visible.length > 0) {
      visible[visible.length - 1].classList.remove('visible');
      return;
    }
    // 没有已显现的 fragment，翻到上一页
    if (currentIndex > 0) {
      goToSlide(currentIndex - 1);
      // 上一页 fragment 全部显现
      getFragments(currentIndex).forEach(f => f.classList.add('visible'));
    }
  }

  // ── 键盘控制 ──
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault();
      nextSlide();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      prevSlide();
    } else if (e.key === 'Home') {
      e.preventDefault();
      goToSlide(0);
    } else if (e.key === 'End') {
      e.preventDefault();
      goToSlide(total - 1);
    }
  });

  // ── 触摸支持（移动端） ──
  let touchStartX = 0;
  document.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) nextSlide();
      else prevSlide();
    }
  }, { passive: true });

  // ── URL 同步：加载时读取 ──
  function loadFromURL() {
    const params = new URLSearchParams(window.location.search);
    const slideParam = parseInt(params.get('slide'), 10);
    if (!isNaN(slideParam) && slideParam >= 0 && slideParam < total) {
      currentIndex = slideParam;
      track.style.transition = 'none';
      goToSlide(currentIndex);
      requestAnimationFrame(() => {
        track.style.transition = `transform var(--transition-slide)`;
      });
    }
  }

  window.addEventListener('popstate', (e) => {
    if (e.state && typeof e.state.slide === 'number') {
      goToSlide(e.state.slide);
    }
  });

  // ── 媒体预加载 ──
  const preloaded = new Set();

  function preloadAdjacentMedia(index) {
    [index - 1, index, index + 1].forEach(i => {
      if (i < 0 || i >= total) return;
      const images = slides[i].querySelectorAll('img[loading="lazy"]');
      images.forEach(img => {
        if (!preloaded.has(img.src)) {
          img.removeAttribute('loading');
          preloaded.add(img.src);
        }
      });
    });
  }

  // ── 初始化 ──
  loadFromURL();
  if (currentIndex === 0) goToSlide(0);
</script>

</body>
</html>
