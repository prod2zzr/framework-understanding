# 合同审查默认合规规则
# 法务人员可直接编辑此文件添加或修改规则
version: "1.0"

compliance_rules:
  - id: "TERM_001"
    description: "合同必须明确约定合同期限"
    description_en: "Contract must specify a definite term/duration"
    category: "basic_terms"
    severity: "high"

  - id: "DISPUTE_001"
    description: "必须包含争议解决条款（仲裁或诉讼管辖约定）"
    description_en: "Must include dispute resolution clause"
    category: "dispute"
    severity: "high"

  - id: "PAYMENT_001"
    description: "付款条件和付款时间必须明确"
    description_en: "Payment terms and schedule must be explicit"
    category: "payment"
    severity: "high"

  - id: "LIABILITY_001"
    description: "违约责任应当对等，不应仅约束一方"
    description_en: "Liability clauses should be reciprocal"
    category: "liability"
    severity: "medium"

  - id: "LIABILITY_002"
    description: "赔偿责任应设定合理上限"
    description_en: "Liability should have a reasonable cap"
    category: "liability"
    severity: "high"

  - id: "FORCE_MAJEURE_001"
    description: "应包含不可抗力条款"
    description_en: "Should include force majeure clause"
    category: "completeness"
    severity: "medium"

  - id: "CONFIDENTIALITY_001"
    description: "保密条款应明确保密期限和范围"
    description_en: "Confidentiality clause must specify scope and duration"
    category: "confidentiality"
    severity: "medium"

  - id: "TERMINATION_001"
    description: "解除合同的条件和程序应当明确"
    description_en: "Termination conditions and procedures must be clear"
    category: "termination"
    severity: "medium"

  - id: "PENALTY_001"
    description: "违约金不应超过合同总金额的30%（参照司法实践）"
    description_en: "Penalty should not exceed 30% of total contract value"
    category: "penalty"
    severity: "high"

  - id: "IP_001"
    description: "涉及知识产权的合同应明确IP归属"
    description_en: "Contracts involving IP must specify ownership"
    category: "intellectual_property"
    severity: "medium"

  - id: "NOTICE_001"
    description: "应约定有效的通知送达方式"
    description_en: "Must specify valid notice delivery method"
    category: "notice"
    severity: "low"

  - id: "LAW_001"
    description: "应明确适用法律"
    description_en: "Must specify governing law"
    category: "governing_law"
    severity: "medium"

expected_clauses:
  - type: "parties"
    description: "合同主体信息（名称、地址、联系方式）"
    importance: "high"
  - type: "subject_matter"
    description: "合同标的"
    importance: "high"
  - type: "price_and_payment"
    description: "价款及支付方式"
    importance: "high"
  - type: "performance"
    description: "履行期限、地点和方式"
    importance: "high"
  - type: "breach_liability"
    description: "违约责任"
    importance: "high"
  - type: "dispute_resolution"
    description: "争议解决方式"
    importance: "high"
  - type: "force_majeure"
    description: "不可抗力"
    importance: "medium"
  - type: "confidentiality"
    description: "保密条款"
    importance: "medium"
  - type: "intellectual_property"
    description: "知识产权归属"
    importance: "medium"
  - type: "governing_law"
    description: "适用法律"
    importance: "medium"
  - type: "notice"
    description: "通知条款"
    importance: "low"
  - type: "amendment_termination"
    description: "合同变更与解除"
    importance: "medium"
