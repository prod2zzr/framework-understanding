# Contract Reviewer 默认配置
# 可通过环境变量 CR_* 覆盖 (如 CR_LLM_MODEL=ollama/qwen2.5:72b)

llm:
  model: "anthropic/claude-sonnet-4-20250514"
  # api_base: null  # 本地部署时设置，如 http://localhost:11434
  temperature: 0.1
  max_output_tokens: 4096
  max_total_tokens: 1000000
  max_concurrent: 5

embedding:
  model: "ollama/bge-large-zh"
  api_base: "http://localhost:11434"

rag:
  vectorstore_path: "./data/chroma"
  retrieval_top_k: 5
  use_reranker: false

chunking:
  chunk_size_tokens: 512
  chunk_overlap_tokens: 64

cache:
  enabled: true
  dir: "./data/cache"

review:
  dimensions:
    - risk_analysis
    - compliance
    - completeness
    - term_fairness
